# Render Blueprint — deploys the full app (API + frontend) from the Dockerfile.
# In the Render dashboard, create a new "Blueprint" from this repo and enter the
# three values when prompted (they're used at build time AND runtime).
#
# Railway/Fly users can ignore this file — they build the Dockerfile directly.
services:
  - type: web
    name: blocly-tools
    runtime: docker
    plan: free # upgrade to "starter" for more RAM if you download large/4K videos
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Render automatically forwards these to the Docker build as build args
      # (matching the ARG names in the Dockerfile), so Vite bakes them in.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_ADMIN_EMAIL
        sync: false
      - key: NODE_ENV
        value: production
